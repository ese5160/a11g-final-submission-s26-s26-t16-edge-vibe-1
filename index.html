<!DOCTYPE html>
<html>
<head>
  <title>Edge Vibe</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #2563eb);
      color: white;
      text-align: center;
    }

    .hero {
      padding: 100px 20px;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 10px;
    }

    p {
      font-size: 22px;
      max-width: 700px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.12);
      margin: 40px auto;
      padding: 30px;
      border-radius: 20px;
      max-width: 800px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    button {
      padding: 14px 28px;
      border: none;
      border-radius: 30px;
      background: white;
      color: #2563eb;
      font-size: 18px;
      cursor: pointer;
      margin-top: 30px;
    }
  </style>
</head>

<body>
  <div class="hero">
    <h1>Edge Vibe</h1>
    <p>A smart edge-computing project built by Team 16.</p>

    <button>Explore Project</button>

    <div class="card">
      <h2>About Our Project</h2>
      <p>
        This website presents our final project, team information,
        system design, implementation, results, and demo.
      </p>
    </div>
  </div>
</body>
</html>
